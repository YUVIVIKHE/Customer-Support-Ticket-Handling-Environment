name: customer-support-ticket-env
version: "1.0.0"
description: >
  An OpenEnv-compliant reinforcement learning environment that simulates
  a customer support agent handling incoming tickets. The agent must classify
  tickets, assign priority, and choose the correct response action.
  Designed for benchmarking LLMs on real-world customer support automation.

reward_range:
  - 0.0
  - 1.0

observation_space:
  type: object
  properties:
    ticket_text:
      type: string
      description: Raw text of the customer support ticket (may be noisy/informal).
    customer_type:
      type: string
      enum: [premium, normal]
      description: The tier of the customer submitting the ticket.
    urgency_level:
      type: string
      enum: [low, medium, high]
      description: The urgency level of the ticket.
    previous_actions:
      type: array
      items:
        type: string
      description: JSON-serialized list of actions taken so far in the episode.

action_space:
  type: object
  properties:
    classify_ticket:
      type: string
      enum: [billing, technical, complaint, general]
      description: The category of the support ticket.
    priority:
      type: string
      enum: [low, medium, high]
      description: The priority level assigned to the ticket.
    response_action:
      type: string
      enum: [reply, escalate, ignore, request_info]
      description: The action the agent takes in response to the ticket.

tasks:
  - name: task_easy
    difficulty: easy
    description: >
      Single-step scenario. The agent receives a simple noisy refund request
      and must correctly classify it as billing and respond with reply.
    max_steps: 3
    expected_steps: 1

  - name: task_medium
    difficulty: medium
    description: >
      Multi-step scenario. The agent handles an internet outage ticket across
      three steps: request more info, reply with solution, then confirm resolution.
    max_steps: 6
    expected_steps: 3

  - name: task_hard
    difficulty: hard
    description: >
      Multi-ticket queue scenario. The agent must handle three tickets in
      priority order (high → medium → low) with correct classification and actions.
    max_steps: 6
    expected_steps: 3

server:
  port: 7860
  endpoints:
    - method: POST
      path: /reset
      description: Initialize a new episode. Returns initial Observation.
    - method: POST
      path: /step
      description: Advance one step. Returns observation, reward, done, info.
    - method: GET
      path: /state
      description: Inspect current episode state.
